<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حسابي - PlantBoom</title>
    <!-- Bootstrap RTL CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Arabic Font -->
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #1a8a5a;
            --primary-light: #25aa72;
            --bg-color: #f7f9f8;
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
        }
        body {
            font-family: 'Almarai', sans-serif;
            background-color: var(--bg-color);
            min-height: 100vh;
            color: var(--text-dark);
        }
        .profile-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
        }
        .glass-card {
            background: white;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 40px rgba(0,0,0,0.03);
            overflow: hidden;
            animation: slideUp 0.6s ease-out;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .profile-header {
            background-color: var(--primary-green);
            padding: 40px 20px;
            color: white;
            text-align: center;
            position: relative;
        }
        .avatar-container {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: white;
            margin: 0 auto;
            border: 5px solid rgba(255,255,255,0.2);
            overflow: hidden;
            margin-bottom: 20px;
        }
        .avatar-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .profile-info {
            padding: 40px;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px dashed var(--border-color);
        }
        .info-label {
            font-weight: 700;
            color: var(--text-muted);
        }
        .info-value {
            font-weight: 400;
            color: var(--text-dark);
        }
        .action-btns {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }
        .btn-green {
            background: var(--primary-green);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-weight: 700;
            flex: 1;
            transition: 0.3s;
        }
        .btn-green:hover { background: var(--primary-light); color: white; }
        .btn-logout {
            background: transparent;
            color: #ef4444;
            border: 1px solid #ef4444;
            padding: 12px 25px;
            border-radius: 10px;
            font-weight: 700;
            flex: 1;
            transition: 0.3s;
        }
        .btn-logout:hover { background: #ef4444; color: white; }
        .hidden { display: none; }
        .back-link {
            display: block;
            margin-bottom: 20px;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 700;
        }
        .back-link:hover { color: var(--primary-green); }
    </style>
</head>
<body>

    <div class="profile-container">
        <a href="index.html" class="back-link"><i class="fas fa-arrow-right ms-2"></i> العودة للرئيسية</a>

        <div id="profile-loader" class="text-center py-5">
            <div class="spinner-border text-success" role="status"></div>
            <p class="mt-3">جاري تحميل بياناتك...</p>
        </div>

        <div class="glass-card hidden" id="profile-content">
            <div class="profile-header">
                <div class="avatar-container">
                    <img id="profile-avatar" src="https://ui-avatars.com/api/?name=User&background=1a8a5a&color=fff" alt="Avatar">
                </div>
                <h2 id="user-full-name" class="mb-1">---</h2>
                <p id="user-email" class="mb-0 opacity-75">---</p>
            </div>

            <div class="profile-info">
                <h5 class="mb-4">معلومات الحساب</h5>
                
                <div class="info-row">
                    <span class="info-label">رقم الهاتف</span>
                    <span class="info-value" id="user-phone">---</span>
                </div>
                <div class="info-row">
                    <span class="info-label">المدينة</span>
                    <span class="info-value" id="user-city">---</span>
                </div>
                <div class="info-row">
                    <span class="info-label">العنوان</span>
                    <span class="info-value" id="user-address">---</span>
                </div>
                <div class="info-row">
                    <span class="info-label">الرمز البريدي</span>
                    <span class="info-value" id="user-postal">---</span>
                </div>

                <div class="action-btns">
                    <button class="btn-green" onclick="window.location.href='profile-setup.html'">
                        <i class="fas fa-edit ms-2"></i> تعديل البيانات
                    </button>
                    <button class="btn-logout" onclick="handleLogout()">
                        <i class="fas fa-sign-out-alt ms-2"></i> تسجيل الخروج
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/profile.js"></script>
</body>
</html>
